name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: "1.15.6"

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Init (no backend) + validate every module and example
        run: |
          set -euo pipefail
          dirs=$(find modules environments -type f -name '*.tf' \
            -exec dirname {} \; | sort -u)
          for d in $dirs; do
            if [ -f "$d/.validate-skip" ]; then
              echo "::notice::skipping $d (.validate-skip present)"
              continue
            fi
            echo "::group::validate $d"
            ( cd "$d" && terraform init -backend=false -input=false -no-color \
              && terraform validate -no-color )
            echo "::endgroup::"
          done

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init
      - run: tflint --recursive

  security:
    name: trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          # Report findings without failing the build (tune as the repo matures).
          exit-code: "0"
