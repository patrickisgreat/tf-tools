name: commitlint

on:
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    name: lint commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint PR commits against Conventional Commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs
